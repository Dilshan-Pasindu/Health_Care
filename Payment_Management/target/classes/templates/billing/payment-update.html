<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Payment | MediCare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f3460 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        .page-wrapper { max-width: 500px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
        .page-header { text-align: center; margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.75rem; font-weight: 800; color: white; }
        .page-header p { color: rgba(255,255,255,0.4); margin-top: 0.3rem; font-size: 0.875rem; }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .form-group { margin-bottom: 1.75rem; }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 0.9rem; pointer-events: none; }
        input[type="text"] {
            width: 100%; padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; color: white; font-size: 0.95rem; font-family: 'Inter', sans-serif;
            transition: all 0.2s; outline: none; font-family: monospace;
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.2); font-family: 'Inter', sans-serif; }
        input[type="text"]:focus { border-color: #3b82f6; background: rgba(59,130,246,0.08); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        input.error { border-color: #ef4444 !important; box-shadow: 0 0 0 3px rgba(239,68,68,0.12) !important; }

        .field-error { font-size: 0.75rem; color: #f87171; margin-top: 0.4rem; display: none; }
        .field-error.show { display: block; }

        .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .status-card {
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 1.25rem 0.75rem;
            text-align: center; cursor: pointer;
            transition: all 0.25s; background: rgba(255,255,255,0.03);
            user-select: none;
        }
        .status-card:hover { background: rgba(255,255,255,0.07); }
        .status-card i { font-size: 1.5rem; display: block; margin-bottom: 0.5rem; }
        .status-card span { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.5px; }

        .status-card.paid { border-color: rgba(16,185,129,0.5); color: #34d399; background: rgba(16,185,129,0.08); }
        .status-card.paid.selected { border-color: #10b981; background: rgba(16,185,129,0.18); box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }

        .status-card.pending { border-color: rgba(245,158,11,0.5); color: #fbbf24; background: rgba(245,158,11,0.08); }
        .status-card.pending.selected { border-color: #f59e0b; background: rgba(245,158,11,0.18); box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }

        .status-card.cancelled { border-color: rgba(239,68,68,0.5); color: #f87171; background: rgba(239,68,68,0.08); }
        .status-card.cancelled.selected { border-color: #ef4444; background: rgba(239,68,68,0.18); box-shadow: 0 0 0 3px rgba(239,68,68,0.2); }

        .submit-btn {
            width: 100%; margin-top: 2rem; padding: 1rem;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border: none; border-radius: 14px; color: white;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 25px rgba(59,130,246,0.3); font-family: 'Inter', sans-serif;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(59,130,246,0.45); }

        .back-link {
            display: block; text-align: center; margin-top: 1.5rem;
            color: rgba(255,255,255,0.35); font-size: 0.85rem; text-decoration: none; transition: color 0.2s;
        }
        .back-link:hover { color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar.html}"></div>

<div class="page-wrapper">
    <div class="page-header">
        <h1><i class="fas fa-pen-to-square" style="color:#38bdf8; margin-right:10px;"></i>Update Status</h1>
        <p>Change the payment status for an existing invoice</p>
    </div>

    <div class="card">
        <form id="updateForm" th:action="@{/billing/update-status}" method="post" novalidate>

            <div class="form-group">
                <label for="invoiceId">Invoice ID</label>
                <div class="input-wrap">
                    <i class="fas fa-hashtag"></i>
                    <input type="text" id="invoiceId" name="invoiceId" placeholder="INV-1234567890" autocomplete="off">
                </div>
                <div class="field-error" id="err-invoiceId">Please enter a valid Invoice ID (e.g. INV-1234567890)</div>
            </div>

            <div class="form-group">
                <label>New Payment Status</label>
                <div class="status-grid">
                    <div class="status-card paid selected" id="card-PAID" onclick="selectStatus('PAID')">
                        <i class="fas fa-check-circle"></i>
                        <span>PAID</span>
                    </div>
                    <div class="status-card pending" id="card-PENDING" onclick="selectStatus('PENDING')">
                        <i class="fas fa-clock"></i>
                        <span>PENDING</span>
                    </div>
                    <div class="status-card cancelled" id="card-CANCELLED" onclick="selectStatus('CANCELLED')">
                        <i class="fas fa-times-circle"></i>
                        <span>CANCELLED</span>
                    </div>
                </div>
                <input type="hidden" name="status" id="statusInput" value="PAID">
            </div>

            <button type="button" class="submit-btn" onclick="validateAndSubmit()">
                <i class="fas fa-rotate"></i> Update Payment Status
            </button>
        </form>

        <a href="/billing/history" class="back-link">
            <i class="fas fa-arrow-left" style="margin-right:5px;"></i> Back to Payment History
        </a>
    </div>
</div>

<script>
    function selectStatus(status) {
        ['PAID', 'PENDING', 'CANCELLED'].forEach(s => {
            document.getElementById('card-' + s).classList.remove('selected');
        });
        document.getElementById('card-' + status).classList.add('selected');
        document.getElementById('statusInput').value = status;
    }

    function validateAndSubmit() {
        const invId = document.getElementById('invoiceId').value.trim();
        const err = document.getElementById('err-invoiceId');
        const el = document.getElementById('invoiceId');

        if (!invId || !invId.startsWith('INV-') || invId.length < 6) {
            el.classList.add('error');
            err.classList.add('show');
            return;
        }
        el.classList.remove('error');
        err.classList.remove('show');
        document.getElementById('updateForm').submit();
    }

    document.getElementById('invoiceId').addEventListener('input', function() {
        this.classList.remove('error');
        document.getElementById('err-invoiceId').classList.remove('show');
    });
</script>
</body>
</html>
