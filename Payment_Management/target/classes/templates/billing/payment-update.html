<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Payment | MediCare</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar.html}"></div>

<div class="max-w-lg mx-auto mt-16 bg-white rounded-3xl shadow-2xl p-10">
    <h2 class="text-3xl font-bold text-center mb-10 text-gray-800 flex items-center justify-center gap-3">
        <i class="fas fa-credit-card text-teal-600"></i>
        Update Payment Status
    </h2>

    <form th:action="@{/billing/update-status}" method="post" class="space-y-8">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">Invoice ID</label>
            <input type="text" name="invoiceId" id="invoiceId" required
                   class="w-full px-6 py-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-teal-500 font-mono"
                   placeholder="INV-1234567890">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">New Payment Status</label>
            <div class="grid grid-cols-3 gap-4">
                <button type="button" onclick="selectStatus(this, 'PAID')"
                        class="status-btn border-2 border-green-500 text-green-600 hover:bg-green-50 py-6 rounded-2xl font-semibold transition">
                    <i class="fas fa-check-circle text-2xl mb-2 block"></i>
                    PAID
                </button>
                <button type="button" onclick="selectStatus(this, 'PENDING')"
                        class="status-btn border-2 border-yellow-500 text-yellow-600 hover:bg-yellow-50 py-6 rounded-2xl font-semibold transition">
                    <i class="fas fa-clock text-2xl mb-2 block"></i>
                    PENDING
                </button>
                <button type="button" onclick="selectStatus(this, 'CANCELLED')"
                        class="status-btn border-2 border-red-500 text-red-600 hover:bg-red-50 py-6 rounded-2xl font-semibold transition">
                    <i class="fas fa-times-circle text-2xl mb-2 block"></i>
                    CANCELLED
                </button>
            </div>
            <input type="hidden" name="status" id="statusInput" value="PAID">
        </div>

        <button type="submit"
                class="w-full bg-gradient-to-r from-teal-600 to-blue-600 hover:from-teal-700 hover:to-blue-700 text-white font-bold py-5 rounded-2xl text-xl transition transform hover:scale-[1.02]">
            Update Payment Status
        </button>
    </form>

    <div class="mt-8 text-center">
        <a href="/billing/summary" class="text-teal-600 hover:text-teal-700 font-medium">
            ← Back to Billing Summary
        </a>
    </div>
</div>

<script>
    function selectStatus(btn, status) {
        document.querySelectorAll('.status-btn').forEach(b => {
            b.classList.remove('ring-4', 'ring-teal-300');
        });
        btn.classList.add('ring-4', 'ring-teal-300');
        document.getElementById('statusInput').value = status;
    }
</script>
</body>
</html>
