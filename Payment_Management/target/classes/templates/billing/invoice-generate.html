<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Generate Invoice | MediCare</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar.html}"></div>

<div class="max-w-2xl mx-auto mt-12 bg-white rounded-3xl shadow-2xl p-10">
    <h2 class="text-3xl font-bold text-center mb-8 text-gray-800">Generate New Invoice</h2>

    <div th:if="${success}" class="mb-8 bg-green-100 border border-green-400 text-green-700 px-6 py-4 rounded-2xl text-center">
        <i class="fas fa-check-circle text-2xl"></i>
        <p class="font-medium mt-2">Invoice Generated Successfully!</p>
        <p th:text="'Invoice ID: ' + ${invoice.invoiceId}"></p>
    </div>

    <form th:action="@{/billing/generate}" method="post" class="space-y-6">
        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Patient ID</label>
                <input type="text" name="patientId" required
                       class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Patient Name</label>
                <input type="text" name="patientName" required
                       class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Appointment ID</label>
            <input type="text" name="appointmentId" required
                   class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Doctor Name</label>
                <input type="text" name="doctorName" required
                       class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Amount (LKR)</label>
                <input type="number" step="0.01" name="amount" required
                       class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Payment Type</label>
            <select name="paymentType" required
                    class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-teal-500">
                <option value="DIRECT">Direct Payment</option>
                <option value="INSURANCE">Insurance Payment</option>
            </select>
        </div>

        <button type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-teal-500 hover:from-blue-700 hover:to-teal-600 text-white font-semibold py-4 rounded-2xl text-lg transition transform hover:scale-105">
            Generate Invoice
        </button>
    </form>
</div>
</body>
</html>
