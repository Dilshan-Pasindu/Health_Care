<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | MediCare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f3460 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .page-wrapper {
            max-width: 520px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        .invoice-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .invoice-badge .inv-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .invoice-badge .inv-id {
            font-family: monospace;
            font-size: 1rem;
            color: #38bdf8;
            margin: 0.3rem 0;
        }

        .invoice-badge .inv-amount {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
        }

        .invoice-badge .inv-amount span {
            font-size: 1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            margin-right: 4px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.35);
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .input-wrap .card-type-icon {
            left: auto;
            right: 1rem;
            font-size: 1.4rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            outline: none;
            letter-spacing: 0.3px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        input:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.08);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        input.error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12) !important;
        }

        input.valid {
            border-color: #10b981 !important;
        }

        .field-hint {
            font-size: 0.73rem;
            margin-top: 0.4rem;
            min-height: 1rem;
        }

        .field-hint.err {
            color: #f87171;
        }

        .field-hint.ok {
            color: #34d399;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .pay-btn {
            width: 100%;
            margin-top: 1.5rem;
            padding: 1rem;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
            font-family: 'Inter', sans-serif;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(59, 130, 246, 0.45);
        }

        .pay-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .gpay-btn {
            background: white;
            color: #1a1a1a;
            border: none;
            border-radius: 14px;
            padding: 1rem;
            width: 100%;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.1);
            margin-top: 1rem;
        }

        .gpay-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 255, 255, 0.2);
        }

        .gpay-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            margin-top: 1rem;
        }

        .hidden {
            display: none !important;
        }

        /* Card visual */
        .card-visual {
            background: linear-gradient(135deg, #1e3a5f, #0f4c81);
            border-radius: 16px;
            padding: 1.5rem 1.5rem 1rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            min-height: 110px;
        }

        .card-visual::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }

        .card-visual::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
        }

        .card-chip {
            width: 36px;
            height: 28px;
            background: linear-gradient(135deg, #fcd34d, #f59e0b);
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .card-number-display {
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.75rem;
        }

        .card-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .card-info .val {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            margin-top: 2px;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/navbar.html}"></div>

    <div class="page-wrapper">
        <!-- Invoice Badge -->
        <div class="invoice-badge">
            <div class="inv-label">Invoice</div>
            <div class="inv-id" th:text="${invoice.invoiceId}">INV-XXXXXXXXXX</div>
            <div class="inv-amount"><span>LKR</span><span th:text="${invoice.amount}">0.00</span></div>
            <div style="color: rgba(255,255,255,0.4); font-size:0.8rem; margin-top:0.3rem;">
                <i class="fas fa-user-injured" style="margin-right:4px;"></i>
                <span th:text="${invoice.patientName}">Patient</span>
                &nbsp;·&nbsp;
                <span th:text="${invoice.paymentType}">DIRECT</span>
            </div>
        </div>

        <div class="card">
            <form id="paymentForm" th:action="@{/billing/process-payment}" method="post">
                <input type="hidden" name="invoiceId" th:value="${invoice.invoiceId}">
                <input type="hidden" name="paymentMethod" id="paymentMethod" value="CARD">

                <!-- Tabs -->
                <div class="tabs">
                    <button type="button" class="tab-btn active" id="tab-card" onclick="showTab(0)">
                        <i class="fas fa-credit-card"></i> Card
                    </button>
                    <button type="button" class="tab-btn" id="tab-gpay" onclick="showTab(1)">
                        <i class="fab fa-google"></i> Google Pay
                    </button>
                </div>

                <!-- CARD SECTION -->
                <div id="card-area">
                    <!-- Card visual preview -->
                    <div class="card-visual">
                        <div class="card-chip"></div>
                        <div class="card-number-display" id="cardPreview">•••• •••• •••• ••••</div>
                        <div class="card-info">
                            <div>
                                <div>Card Holder</div>
                                <div class="val" id="namePreview">FULL NAME</div>
                            </div>
                            <div>
                                <div>Expires</div>
                                <div class="val" id="expiryPreview">MM/YY</div>
                            </div>
                            <div id="cardTypeIcon" style="font-size:1.8rem; align-self:flex-end;">💳</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Card Number</label>
                        <div class="input-wrap">
                            <i class="fas fa-credit-card"></i>
                            <input type="text" id="cardNumber" maxlength="19" placeholder="1234 5678 9012 3456"
                                oninput="formatCardNumber(this)" autocomplete="cc-number">
                        </div>
                        <div class="field-hint" id="hint-card"></div>
                    </div>

                    <div class="two-col">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <div class="input-wrap">
                                <i class="fas fa-calendar-alt"></i>
                                <input type="text" id="expiry" maxlength="5" placeholder="MM/YY"
                                    oninput="formatExpiry(this)" autocomplete="cc-exp">
                            </div>
                            <div class="field-hint" id="hint-expiry"></div>
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <div class="input-wrap">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="cvv" maxlength="4" placeholder="•••"
                                    oninput="validateCVV(this)" autocomplete="cc-csc">
                            </div>
                            <div class="field-hint" id="hint-cvv"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Cardholder Name</label>
                        <div class="input-wrap">
                            <i class="fas fa-user"></i>
                            <input type="text" id="cardName" placeholder="As printed on card"
                                oninput="updateNamePreview(this)" autocomplete="cc-name">
                        </div>
                        <div class="field-hint" id="hint-name"></div>
                    </div>

                    <button type="button" class="pay-btn" onclick="submitCardPayment()">
                        <i class="fas fa-lock"></i> Pay Securely
                    </button>
                </div>

                <!-- GOOGLE PAY SECTION -->
                <div id="gpay-area" class="hidden">
                    <div style="text-align:center; padding: 1rem 0 1.5rem;">
                        <div
                            style="width:64px; height:64px; background:white; border-radius:16px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:1rem; box-shadow: 0 8px 20px rgba(0,0,0,0.3);">
                            <i class="fab fa-google"
                                style="font-size:2rem; background: linear-gradient(135deg,#4285F4,#EA4335,#FBBC04,#34A853); -webkit-background-clip:text; -webkit-text-fill-color:transparent;"></i>
                        </div>
                        <div style="font-weight:700; font-size:1.1rem; color:white;">Google Pay</div>
                        <div style="color:rgba(255,255,255,0.4); font-size:0.8rem; margin-top:4px;">Fast, secure,
                            contactless payment</div>
                    </div>

                    <div class="form-group">
                        <label>Gmail Address</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="gmail" placeholder="yourname@gmail.com"
                                oninput="validateGmail(this)" autocomplete="email">
                        </div>
                        <div class="field-hint" id="hint-gmail"></div>
                    </div>

                    <button type="button" class="gpay-btn" id="gpayBtn" onclick="submitGooglePay()" disabled>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Google_Pay_Logo.svg/512px-Google_Pay_Logo.svg.png"
                            alt="GPay" style="height:22px;" onerror="this.style.display='none'">
                        Pay with Google Pay
                    </button>
                </div>
            </form>

            <div class="security-badge">
                <i class="fas fa-shield-alt"></i> 256-bit SSL encrypted &nbsp;·&nbsp; PCI DSS compliant
            </div>
        </div>
    </div>

    <script>
        /* ── TAB SWITCH ── */
        function showTab(tab) {
            document.getElementById('card-area').classList.toggle('hidden', tab === 1);
            document.getElementById('gpay-area').classList.toggle('hidden', tab === 0);
            document.getElementById('paymentMethod').value = tab === 0 ? 'CARD' : 'GOOGLE_PAY';
            document.getElementById('tab-card').classList.toggle('active', tab === 0);
            document.getElementById('tab-gpay').classList.toggle('active', tab === 1);
        }

        /* ── LUHN ALGORITHM ── */
        function luhn(num) {
            let sum = 0, alt = false;
            for (let i = num.length - 1; i >= 0; i--) {
                let d = parseInt(num[i]);
                if (alt) { d *= 2; if (d > 9) d -= 9; }
                sum += d; alt = !alt;
            }
            return sum % 10 === 0;
        }

        /* ── CARD TYPE DETECT ── */
        function detectCardType(num) {
            if (/^4/.test(num)) return { icon: '💳', name: 'Visa' };
            if (/^5[1-5]/.test(num)) return { icon: '💳', name: 'Mastercard' };
            if (/^3[47]/.test(num)) return { icon: '💳', name: 'Amex' };
            if (/^6(?:011|5)/.test(num)) return { icon: '💳', name: 'Discover' };
            return { icon: '💳', name: '' };
        }

        /* ── FORMAT CARD NUMBER ── */
        function formatCardNumber(el) {
            let v = el.value.replace(/\D/g, '').slice(0, 16);
            el.value = v.replace(/(.{4})/g, '$1 ').trim();

            // Preview
            const padded = (v + '################').slice(0, 16);
            const display = padded.replace(/(.{4})/g, '$1 ').trim();
            document.getElementById('cardPreview').textContent = v.length === 0 ? '•••• •••• •••• ••••' : display;

            const hint = document.getElementById('hint-card');
            if (v.length === 16) {
                if (luhn(v)) {
                    const t = detectCardType(v);
                    el.classList.remove('error'); el.classList.add('valid');
                    hint.className = 'field-hint ok';
                    hint.textContent = '✓ Valid ' + (t.name || 'card');
                    document.getElementById('cardTypeIcon').textContent = t.icon;
                } else {
                    el.classList.add('error'); el.classList.remove('valid');
                    hint.className = 'field-hint err'; hint.textContent = '✗ Invalid card number';
                }
            } else if (v.length > 0) {
                el.classList.remove('error', 'valid'); hint.className = 'field-hint'; hint.textContent = v.length + ' / 16 digits';
            } else {
                el.classList.remove('error', 'valid'); hint.textContent = '';
            }
        }

        /* ── FORMAT EXPIRY ── */
        function formatExpiry(el) {
            let v = el.value.replace(/\D/g, '').slice(0, 4);
            if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
            el.value = v;
            document.getElementById('expiryPreview').textContent = v || 'MM/YY';

            const hint = document.getElementById('hint-expiry');
            if (/^\d{2}\/\d{2}$/.test(v)) {
                const [mm, yy] = v.split('/').map(Number);
                const now = new Date();
                const expDate = new Date(2000 + yy, mm - 1, 1);
                const thisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                if (mm < 1 || mm > 12) {
                    el.classList.add('error'); el.classList.remove('valid');
                    hint.className = 'field-hint err'; hint.textContent = '✗ Invalid month';
                } else if (expDate < thisMonth) {
                    el.classList.add('error'); el.classList.remove('valid');
                    hint.className = 'field-hint err'; hint.textContent = '✗ Card has expired';
                } else {
                    el.classList.remove('error'); el.classList.add('valid');
                    hint.className = 'field-hint ok'; hint.textContent = '✓ Valid expiry';
                }
            } else {
                el.classList.remove('error', 'valid'); hint.textContent = '';
            }
        }

        /* ── VALIDATE CVV ── */
        function validateCVV(el) {
            const v = el.value.replace(/\D/g, '');
            el.value = v;
            const hint = document.getElementById('hint-cvv');
            if (v.length >= 3) {
                el.classList.remove('error'); el.classList.add('valid');
                hint.className = 'field-hint ok'; hint.textContent = '✓ CVV looks good';
            } else if (v.length > 0) {
                el.classList.remove('valid'); hint.className = 'field-hint'; hint.textContent = v.length + ' / 3+ digits';
            } else {
                el.classList.remove('error', 'valid'); hint.textContent = '';
            }
        }

        /* ── NAME PREVIEW ── */
        function updateNamePreview(el) {
            const v = el.value.toUpperCase().replace(/[^A-Z\s]/g, '');
            document.getElementById('namePreview').textContent = v || 'FULL NAME';
            const hint = document.getElementById('hint-name');
            if (v.trim().length >= 3) {
                el.classList.remove('error'); el.classList.add('valid');
                hint.className = 'field-hint ok'; hint.textContent = '✓ Valid name';
            } else if (v.length > 0) {
                el.classList.remove('valid', 'error'); hint.textContent = '';
            } else {
                el.classList.remove('error', 'valid'); hint.textContent = '';
            }
        }

        /* ── VALIDATE GMAIL ── */
        function validateGmail(el) {
            const v = el.value.trim();
            const btn = document.getElementById('gpayBtn');
            const hint = document.getElementById('hint-gmail');
            const isGmail = /^[^\s@]+@gmail\.com$/i.test(v);
            if (isGmail) {
                el.classList.remove('error'); el.classList.add('valid');
                hint.className = 'field-hint ok'; hint.textContent = '✓ Valid Gmail address';
                btn.disabled = false;
            } else if (v.length > 0) {
                el.classList.remove('valid'); el.classList.add('error');
                hint.className = 'field-hint err';
                hint.textContent = v.includes('@') && !v.includes('@gmail.com') ? '✗ Must be a @gmail.com address' : '✗ Enter a valid Gmail address';
                btn.disabled = true;
            } else {
                el.classList.remove('error', 'valid'); hint.textContent = ''; btn.disabled = true;
            }
        }

        /* ── SUBMIT CARD ── */
        function submitCardPayment() {
            const raw = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const expiry = document.getElementById('expiry').value;
            const cvv = document.getElementById('cvv').value;
            const name = document.getElementById('cardName').value.trim();
            let ok = true;

            if (raw.length !== 16 || !luhn(raw)) {
                setErr('cardNumber', 'hint-card', '✗ Please enter a valid 16-digit card number'); ok = false;
            }
            if (!/^\d{2}\/\d{2}$/.test(expiry)) {
                setErr('expiry', 'hint-expiry', '✗ Enter expiry as MM/YY'); ok = false;
            } else {
                const [mm, yy] = expiry.split('/').map(Number);
                const exp = new Date(2000 + yy, mm - 1, 1);
                const now = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
                if (mm < 1 || mm > 12 || exp < now) {
                    setErr('expiry', 'hint-expiry', '✗ Card is expired or invalid month'); ok = false;
                }
            }
            if (cvv.length < 3) { setErr('cvv', 'hint-cvv', '✗ CVV must be 3–4 digits'); ok = false; }
            if (name.length < 3) { setErr('cardName', 'hint-name', '✗ Enter cardholder name (min 3 chars)'); ok = false; }

            if (ok) document.getElementById('paymentForm').submit();
        }

        function setErr(fieldId, hintId, msg) {
            const el = document.getElementById(fieldId);
            el.classList.add('error'); el.classList.remove('valid');
            const h = document.getElementById(hintId);
            h.className = 'field-hint err'; h.textContent = msg;
        }

        /* ── SUBMIT GOOGLE PAY ── */
        function submitGooglePay() {
            document.getElementById('paymentForm').submit();
        }
    </script>
</body>

</html>
