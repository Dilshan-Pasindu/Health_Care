<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Make Payment | MediCare</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar.html}"></div>

<div class="max-w-lg mx-auto mt-12 bg-white rounded-3xl shadow-2xl p-10">
    <h2 class="text-3xl font-bold text-center mb-2">Secure Payment</h2>
    <p class="text-center text-gray-600 mb-8" th:text="'Invoice: ' + ${invoice.invoiceId}"></p>

    <div class="bg-teal-50 p-6 rounded-2xl mb-10 text-center">
        <span class="text-3xl font-bold" th:text="'LKR ' + ${invoice.amount}"></span>
    </div>

    <form id="paymentForm" th:action="@{/billing/process-payment}" method="post">
        <input type="hidden" name="invoiceId" th:value="${invoice.invoiceId}">
        <input type="hidden" name="paymentMethod" id="paymentMethod" value="CARD">

        <!-- Tabs -->
        <div class="flex border-b mb-8">
            <button type="button" onclick="showTab(0)"
                    class="flex-1 py-4 font-semibold border-b-4 border-teal-600 text-teal-600" id="tab-card">Card</button>
            <button type="button" onclick="showTab(1)"
                    class="flex-1 py-4 font-semibold text-gray-500" id="tab-gpay">Google Pay</button>
        </div>

        <!-- Card Section -->
        <div id="card-area">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Card Number</label>
                    <input type="text" id="cardNumber" maxlength="19" placeholder="1234 5678 9012 3456"
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg">
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Expiry Date (MM/YY)</label>
                        <input type="text" id="expiry" maxlength="5" placeholder="12/28"
                               class="w-full px-5 py-4 border border-gray-300 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">CVV</label>
                        <input type="text" id="cvv" maxlength="4" placeholder="123"
                               class="w-full px-5 py-4 border border-gray-300 rounded-2xl">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Cardholder Name</label>
                    <input type="text" id="cardName" placeholder="John Doe"
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl">
                </div>
            </div>

            <button type="button" onclick="submitCardPayment()"
                    class="w-full mt-10 bg-blue-600 hover:bg-blue-700 text-white font-bold py-6 rounded-3xl text-2xl">
                Pay
            </button>
        </div>

        <!-- Google Pay Section -->
        <div id="gpay-area" class="hidden text-center py-8">
            <i class="fab fa-google text-7xl text-red-500 mb-6"></i>
            <p class="text-2xl font-medium mb-6">Google Pay</p>

            <div class="mb-8">
                <label class="block text-sm font-medium mb-2 text-left">Google Account Email</label>
                <input type="email" id="gmail" placeholder="your.email@gmail.com"
                       onkeyup="validateGmail()"
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl">
            </div>

            <button type="button" id="gpayBtn" onclick="submitGooglePay()"
                    class="w-full bg-black hover:bg-gray-900 text-white font-bold py-6 rounded-3xl text-2xl flex items-center justify-center gap-3 opacity-50 cursor-not-allowed"
                    disabled>
                <i class="fab fa-google"></i>
                Pay with Google Pay
            </button>
        </div>
    </form>
</div>

<script>
    function showTab(tab) {
        document.getElementById('card-area').classList.toggle('hidden', tab === 1);
        document.getElementById('gpay-area').classList.toggle('hidden', tab === 0);

        document.getElementById('paymentMethod').value = tab === 0 ? 'CARD' : 'GOOGLE_PAY';

        document.getElementById('tab-card').classList.toggle('border-teal-600', tab === 0);
        document.getElementById('tab-card').classList.toggle('text-teal-600', tab === 0);
        document.getElementById('tab-gpay').classList.toggle('border-teal-600', tab === 1);
        document.getElementById('tab-gpay').classList.toggle('text-teal-600', tab === 1);
    }

    function validateGmail() {
        const email = document.getElementById('gmail').value.trim();
        const btn = document.getElementById('gpayBtn');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (emailRegex.test(email) && email.toLowerCase().includes('@gmail.com')) {
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            btn.classList.add('hover:bg-gray-900');
        } else {
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
        }
    }

    function submitCardPayment() {
        const cardNumber = document.getElementById('cardNumber').value.trim().replace(/\s/g, '');
        const expiry = document.getElementById('expiry').value.trim();
        const cvv = document.getElementById('cvv').value.trim();
        const cardName = document.getElementById('cardName').value.trim();

        if (cardNumber.length < 16) {
            alert("Please enter a valid 16-digit card number");
            return;
        }
        if (!/^\d{2}\/\d{2}$/.test(expiry)) {
            alert("Please enter expiry date in MM/YY format");
            return;
        }
        if (cvv.length < 3) {
            alert("Please enter valid CVV");
            return;
        }
        if (cardName.length < 3) {
            alert("Please enter cardholder name");
            return;
        }

        alert("✅ Payment Successful!\n\nRedirecting to history...");
        document.getElementById('paymentForm').submit();
    }

    function submitGooglePay() {
        const email = document.getElementById('gmail').value.trim();
        alert("✅ Payment Successful with Google Pay (" + email + ")!\n\nRedirecting to history...");
        document.getElementById('paymentForm').submit();
    }
</script>
</body>
</html>
