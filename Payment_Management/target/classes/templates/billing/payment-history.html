<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History | MediCare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- jsPDF for client-side PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f3460 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        .page-wrapper { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: gap; gap: 1rem; }
        .page-header h1 { font-size: 1.75rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 12px; }
        .page-header h1 i { color: #38bdf8; }

        .header-actions { display: flex; gap: 10px; align-items: center; }

        .btn-outline {
            padding: 8px 18px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 7px;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.25); }

        .success-banner {
            background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(5,150,105,0.08));
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 14px; padding: 1rem 1.5rem;
            margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px;
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
        .success-banner i { color: #10b981; font-size: 1.4rem; flex-shrink: 0; }
        .success-banner span { color: #6ee7b7; font-weight: 600; }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 1.25rem 1.5rem;
            display: flex; align-items: center; gap: 14px;
        }
        .stat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .stat-icon.blue { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .stat-icon.green { background: rgba(16,185,129,0.2); color: #34d399; }
        .stat-icon.yellow { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .stat-val { font-size: 1.5rem; font-weight: 800; color: white; line-height: 1; }
        .stat-lbl { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 3px; }

        /* Search */
        .search-bar {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 0.9rem 1.25rem;
            display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem;
        }
        .search-bar i { color: rgba(255,255,255,0.3); }
        .search-bar input {
            flex: 1; background: transparent; border: none; outline: none;
            color: white; font-size: 0.9rem; font-family: 'Inter', sans-serif;
        }
        .search-bar input::placeholder { color: rgba(255,255,255,0.25); }

        /* Table */
        .table-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px; overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(6,182,212,0.2)); }
        thead th {
            padding: 1rem 1.25rem; text-align: left;
            font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.5);
            text-transform: uppercase; letter-spacing: 0.7px; white-space: nowrap;
        }
        thead th:last-child { text-align: center; }
        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.04); }
        td { padding: 1rem 1.25rem; font-size: 0.875rem; vertical-align: middle; }
        .td-center { text-align: center; }

        .invoice-id { font-family: monospace; font-size: 0.8rem; color: #38bdf8; }
        .amount { font-weight: 700; color: white; }

        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.3px;
        }
        .badge-paid { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
        .badge-pending { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
        .badge-cancelled { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        .badge-type { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); font-size: 0.68rem; }

        .action-group { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-pay {
            padding: 6px 16px; border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white; font-size: 0.8rem; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.2s;
        }
        .btn-pay:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(59,130,246,0.4); }

        .btn-pdf {
            padding: 6px 12px; border-radius: 8px;
            background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.25);
            color: #f87171; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif;
            display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s;
        }
        .btn-pdf:hover { background: rgba(239,68,68,0.25); }

        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-state i { font-size: 3rem; color: rgba(255,255,255,0.1); margin-bottom: 1rem; }
        .empty-state p { color: rgba(255,255,255,0.3); }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; }
            table { font-size: 0.78rem; }
            td, th { padding: 0.75rem 0.75rem !important; }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar.html}"></div>

<div class="page-wrapper">
    <div class="page-header">
        <h1><i class="fas fa-history"></i> Payment History</h1>
        <div class="header-actions">
            <a href="/billing/generate" class="btn-outline"><i class="fas fa-plus"></i> New Invoice</a>
        </div>
    </div>

    <!-- Success Banner -->
    <div class="success-banner" th:if="${message}">
        <i class="fas fa-check-circle"></i>
        <span th:text="${message}"></span>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon blue"><i class="fas fa-file-invoice"></i></div>
            <div>
                <div class="stat-val" th:text="${invoices != null ? invoices.size() : 0}">0</div>
                <div class="stat-lbl">Total Invoices</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
            <div>
                <div class="stat-val"
                     th:text="${invoices != null ? #lists.size(invoices.?[status == 'PAID']) : 0}">0</div>
                <div class="stat-lbl">Paid</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon yellow"><i class="fas fa-clock"></i></div>
            <div>
                <div class="stat-val"
                     th:text="${invoices != null ? #lists.size(invoices.?[status == 'PENDING']) : 0}">0</div>
                <div class="stat-lbl">Pending</div>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by invoice ID, patient, doctor..." oninput="filterTable()">
    </div>

    <!-- Table -->
    <div class="table-card">
        <table id="invoiceTable">
            <thead>
            <tr>
                <th>Invoice ID</th>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Type</th>
                <th style="text-align:right;">Amount (LKR)</th>
                <th>Status</th>
                <th>Date</th>
                <th style="text-align:center;">Actions</th>
            </tr>
            </thead>
            <tbody th:if="${invoices != null and !#lists.isEmpty(invoices)}">
            <tr th:each="inv : ${invoices}">
                <td class="invoice-id" th:text="${inv.invoiceId}"></td>
                <td>
                    <div style="font-weight:600; color:white;" th:text="${inv.patientName}"></div>
                    <div style="font-size:0.75rem; color:rgba(255,255,255,0.35);" th:text="'ID: ' + ${inv.patientId}"></div>
                </td>
                <td th:text="${inv.doctorName}" style="color:rgba(255,255,255,0.75);"></td>
                <td>
                    <span class="badge badge-type" th:text="${inv.paymentType}"></span>
                </td>
                <td class="amount" style="text-align:right;" th:text="${'LKR ' + inv.amount}"></td>
                <td>
                    <span class="badge badge-paid" th:if="${inv.status == 'PAID'}"><i class="fas fa-check-circle"></i> PAID</span>
                    <span class="badge badge-pending" th:if="${inv.status == 'PENDING'}"><i class="fas fa-clock"></i> PENDING</span>
                    <span class="badge badge-cancelled" th:if="${inv.status == 'CANCELLED'}"><i class="fas fa-times-circle"></i> CANCELLED</span>
                </td>
                <td style="color:rgba(255,255,255,0.5); font-size:0.8rem;"
                    th:text="${#temporals.format(inv.generatedDate, 'dd MMM yyyy HH:mm')}"></td>
                <td class="td-center">
                    <div class="action-group">
                        <a th:if="${inv.status == 'PENDING'}"
                           th:href="@{/billing/pay/{id}(id=${inv.invoiceId})}"
                           class="btn-pay"><i class="fas fa-credit-card"></i> Pay</a>
                        <button class="btn-pdf"
                                th:attr="
                                    onclick='downloadPDF(' +
                                    '&quot;' + ${inv.invoiceId} + '&quot;,' +
                                    '&quot;' + ${inv.patientName} + '&quot;,' +
                                    '&quot;' + ${inv.patientId} + '&quot;,' +
                                    '&quot;' + ${inv.doctorName} + '&quot;,' +
                                    '&quot;' + ${inv.appointmentId} + '&quot;,' +
                                    ${inv.amount} + ',' +
                                    '&quot;' + ${inv.status} + '&quot;,' +
                                    '&quot;' + ${inv.paymentType} + '&quot;,' +
                                    '&quot;' + ${#temporals.format(inv.generatedDate, 'dd MMM yyyy HH:mm')} + '&quot;' +
                                    ')'">
                            <i class="fas fa-file-pdf"></i> PDF
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
            <tbody th:if="${invoices == null or #lists.isEmpty(invoices)}">
            <tr>
                <td colspan="8">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No invoices found. <a href="/billing/generate" style="color:#38bdf8;">Generate one now →</a></p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    /* ── TABLE FILTER ── */
    function filterTable() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#invoiceTable tbody tr').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    }

    /* ── PDF DOWNLOAD ── */
    function downloadPDF(invoiceId, patientName, patientId, doctorName, appointmentId, amount, status, paymentType, date) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

        const pageW = doc.internal.pageSize.getWidth();
        const margin = 20;
        let y = 0;

        // Header background
        doc.setFillColor(15, 23, 42);
        doc.rect(0, 0, pageW, 50, 'F');

        // Logo area
        doc.setFillColor(59, 130, 246);
        doc.roundedRect(margin, 12, 30, 24, 3, 3, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.text('MEDI', margin + 4, 22);
        doc.text('CARE', margin + 4, 29);

        doc.setFontSize(22);
        doc.setFont('helvetica', 'bold');
        doc.text('MediCare Payment System', margin + 36, 26);
        doc.setFontSize(9);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(148, 163, 184);
        doc.text('Professional Medical Billing', margin + 36, 33);

        y = 60;

        // Invoice title
        doc.setFontSize(18);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(15, 23, 42);
        doc.text('INVOICE', margin, y);

        // Status badge
        const statusColor = status === 'PAID' ? [16, 185, 129] : status === 'PENDING' ? [245, 158, 11] : [239, 68, 68];
        doc.setFillColor(...statusColor);
        doc.roundedRect(pageW - margin - 30, y - 8, 30, 10, 2, 2, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(8);
        doc.setFont('helvetica', 'bold');
        doc.text(status, pageW - margin - 15, y - 1, { align: 'center' });

        y += 6;
        doc.setDrawColor(226, 232, 240);
        doc.setLineWidth(0.5);
        doc.line(margin, y, pageW - margin, y);
        y += 10;

        // Invoice meta
        doc.setFontSize(9);
        doc.setTextColor(100, 116, 139);
        doc.setFont('helvetica', 'normal');
        doc.text('Invoice Number', margin, y);
        doc.text('Date Issued', pageW / 2, y);
        y += 5;
        doc.setTextColor(15, 23, 42);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.text(invoiceId, margin, y);
        doc.text(date, pageW / 2, y);
        y += 14;

        // Patient / Doctor box
        doc.setFillColor(248, 250, 252);
        doc.roundedRect(margin, y, (pageW - 2 * margin) / 2 - 5, 45, 3, 3, 'F');
        doc.roundedRect(pageW / 2 + 2, y, (pageW - 2 * margin) / 2 - 5, 45, 3, 3, 'F');

        doc.setFontSize(7);
        doc.setTextColor(100, 116, 139);
        doc.setFont('helvetica', 'bold');
        doc.text('BILLED TO', margin + 4, y + 8);
        doc.text('ATTENDING PHYSICIAN', pageW / 2 + 6, y + 8);

        doc.setTextColor(15, 23, 42);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        doc.text(patientName, margin + 4, y + 16);
        doc.text('Dr. ' + doctorName, pageW / 2 + 6, y + 16);

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(71, 85, 105);
        doc.text('Patient ID: ' + patientId, margin + 4, y + 23);
        doc.text('Appointment: ' + appointmentId, pageW / 2 + 6, y + 23);
        doc.text('Payment Type: ' + paymentType, margin + 4, y + 30);
        y += 55;

        // Service table header
        doc.setFillColor(15, 23, 42);
        doc.rect(margin, y, pageW - 2 * margin, 9, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8);
        doc.text('DESCRIPTION', margin + 4, y + 6);
        doc.text('AMOUNT (LKR)', pageW - margin - 4, y + 6, { align: 'right' });
        y += 9;

        // Service row
        doc.setFillColor(248, 250, 252);
        doc.rect(margin, y, pageW - 2 * margin, 12, 'F');
        doc.setTextColor(15, 23, 42);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.text('Medical Consultation & Services', margin + 4, y + 8);
        doc.setFont('helvetica', 'bold');
        doc.text('LKR ' + amount.toFixed(2), pageW - margin - 4, y + 8, { align: 'right' });
        y += 22;

        // Total
        doc.setDrawColor(226, 232, 240);
        doc.line(pageW - margin - 60, y, pageW - margin, y);
        y += 6;
        doc.setFontSize(9);
        doc.setTextColor(100, 116, 139);
        doc.setFont('helvetica', 'normal');
        doc.text('Subtotal', pageW - margin - 60, y);
        doc.text('LKR ' + amount.toFixed(2), pageW - margin, y, { align: 'right' });
        y += 5;
        doc.text('Tax (0%)', pageW - margin - 60, y);
        doc.text('LKR 0.00', pageW - margin, y, { align: 'right' });
        y += 2;
        doc.setDrawColor(15, 23, 42);
        doc.line(pageW - margin - 60, y, pageW - margin, y);
        y += 7;
        doc.setFontSize(12);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(15, 23, 42);
        doc.text('TOTAL DUE', pageW - margin - 60, y);
        doc.setTextColor(59, 130, 246);
        doc.text('LKR ' + amount.toFixed(2), pageW - margin, y, { align: 'right' });

        y += 20;
        // Footer
        doc.setFillColor(248, 250, 252);
        doc.rect(0, 265, pageW, 32, 'F');
        doc.setFontSize(7.5);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(100, 116, 139);
        doc.text('Thank you for choosing MediCare. This is a computer-generated invoice and does not require a signature.', pageW / 2, 272, { align: 'center' });
        doc.text('For billing queries contact: billing@medicare.lk  |  Tel: +94 11 234 5678', pageW / 2, 278, { align: 'center' });
        doc.setTextColor(148, 163, 184);
        doc.text('MediCare Medical Group  |  Colombo, Sri Lanka', pageW / 2, 285, { align: 'center' });

        doc.save('Invoice-' + invoiceId + '.pdf');
    }
</script>
</body>
</html>
