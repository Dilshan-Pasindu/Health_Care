<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="navbar">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<nav style="
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f4c81 100%);
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    font-family: 'Inter', sans-serif;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.08);
">
    <div style="max-width: 1280px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 68px;">
        <a href="/billing/history" style="text-decoration: none; display: flex; align-items: center; gap: 12px;">
            <div style="
                width: 42px; height: 42px;
                background: linear-gradient(135deg, #3b82f6, #06b6d4);
                border-radius: 12px;
                display: flex; align-items: center; justify-content: center;
                box-shadow: 0 4px 15px rgba(59,130,246,0.4);
            ">
                <i class="fas fa-heartbeat" style="color: white; font-size: 18px;"></i>
            </div>
            <div>
                <span style="font-weight: 800; font-size: 1.3rem; color: white; letter-spacing: -0.5px;">Medi<span style="color: #38bdf8;">Care</span></span>
                <p style="font-size: 0.68rem; color: rgba(255,255,255,0.5); margin: 0; letter-spacing: 0.5px; text-transform: uppercase;">Payment System</p>
            </div>
        </a>

        <div style="display: flex; gap: 6px; align-items: center;">
            <a href="/billing/generate" style="
                color: rgba(255,255,255,0.75);
                text-decoration: none;
                font-size: 0.875rem;
                font-weight: 500;
                padding: 8px 16px;
                border-radius: 8px;
                transition: all 0.2s;
                display: flex; align-items: center; gap: 8px;
            " onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='white';"
               onmouseout="this.style.background='transparent'; this.style.color='rgba(255,255,255,0.75)';">
                <i class="fas fa-file-invoice-dollar"></i>
                Generate Invoice
            </a>
            <a href="/billing/history" style="
                color: rgba(255,255,255,0.75);
                text-decoration: none;
                font-size: 0.875rem;
                font-weight: 500;
                padding: 8px 16px;
                border-radius: 8px;
                transition: all 0.2s;
                display: flex; align-items: center; gap: 8px;
            " onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='white';"
               onmouseout="this.style.background='transparent'; this.style.color='rgba(255,255,255,0.75)';">
                <i class="fas fa-history"></i>
                Payment History
            </a>
        </div>
    </div>
</nav>
</html>
