<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Billing & Payment | MediCare</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar.html}"></div>

<div class="max-w-7xl mx-auto px-6 py-10">
    <h1 class="text-4xl font-bold text-gray-800 mb-8 flex items-center gap-4">
        <i class="fas fa-history text-teal-600"></i>
        Billing & Payment History
    </h1>

    <!-- Success Message -->
    <div th:if="${message}"
         class="mb-8 bg-green-100 border border-green-400 text-green-700 px-8 py-5 rounded-3xl text-center text-xl font-medium">
        <span th:text="${message}"></span>
    </div>

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <table class="w-full">
            <thead class="bg-gradient-to-r from-blue-700 to-teal-600 text-white">
            <tr>
                <th class="px-6 py-5 text-left">Invoice ID</th>
                <th class="px-6 py-5 text-left">Patient</th>
                <th class="px-6 py-5 text-left">Doctor</th>
                <th class="px-6 py-5 text-right">Amount (LKR)</th>
                <th class="px-6 py-5 text-center">Status</th>
                <th class="px-6 py-5 text-left">Date</th>
                <th class="px-6 py-5 text-center">Action</th>
            </tr>
            </thead>
            <tbody class="divide-y" th:each="inv : ${invoices}">
            <tr class="hover:bg-teal-50">
                <td class="px-6 py-5 font-mono" th:text="${inv.invoiceId}"></td>
                <td class="px-6 py-5" th:text="${inv.patientName}"></td>
                <td class="px-6 py-5" th:text="${inv.doctorName}"></td>
                <td class="px-6 py-5 text-right font-semibold" th:text="${inv.amount}"></td>
                <td class="px-6 py-5 text-center">
                    <span th:if="${inv.status == 'PAID'}" class="px-6 py-2 bg-green-100 text-green-700 rounded-full text-sm font-medium">PAID</span>
                    <span th:if="${inv.status == 'PENDING'}" class="px-6 py-2 bg-yellow-100 text-yellow-700 rounded-full text-sm font-medium">PENDING</span>
                </td>
                <td class="px-6 py-5 text-sm text-gray-600"
                    th:text="${#temporals.format(inv.generatedDate, 'dd MMM yyyy HH:mm')}"></td>
                <td class="px-6 py-5 text-center">
                    <a th:if="${inv.status == 'PENDING'}"
                       th:href="@{/billing/pay/{id}(id=${inv.invoiceId})}"
                       class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl text-sm font-medium">
                        💳 Pay Now
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
